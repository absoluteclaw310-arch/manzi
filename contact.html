<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Manzi Remodeling</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="kitchens.html">Kitchens</a></li>
                <li><a href="bathrooms.html">Bathrooms</a></li>
                <li><a href="tile.html">Tile Work</a></li>

                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Contact Us</h1>
        <p>Ready to start your project? Send us a message and we'll get back to you shortly.</p>
        <form action="#" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="project-type">Project Type:</label>
                <select id="project-type" name="project-type">
                    <option value="kitchen">Kitchen Remodeling</option>
                    <option value="bathroom">Bathroom Remodeling</option>
                    <option value="tile">Custom Tile Work</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="city">City:</label>
                <input type="text" id="city" name="city" required>
            </div>
            <div class="form-group">
                <label for="description">Project Description:</label>
                <textarea id="description" name="description" rows="5"></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Manzi Remodeling. All rights reserved.</p>
    </footer>
</body>
</html>
